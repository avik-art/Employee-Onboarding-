<!DOCTYPE html>
<html>
<head>
<base target="_top">
<meta charset="utf-8">
<style>
  :root{
    --cream:#faf7f0;--white:#fff;--ink:#16201b;--muted:#5c6660;--subtle:#79847d;
    --pine:#095d40;--pine-800:#073b2c;--pine-900:#042e22;--pine-50:#ecf3ee;--pine-100:#dceae2;
    --leaf:#7cb041;--leaf-600:#6ba336;--leaf-700:#5c9130;--leaf-50:#f1f7e8;--leaf-100:#e6f0d6;
    --amber:#e0a33b;--amber-bg:#fdf8ee;--clay:#c75d4f;--clay-bg:#fcf1ee;
    --b-sub:#e3e7e2;--b-def:#cbd2cc;--gray-50:#f6f8f4;--gray-100:#eef1ec;
    --font:'Plus Jakarta Sans',system-ui,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);color:var(--ink);background:var(--cream)}
  .layout{display:flex;min-height:100vh}
  .side{width:240px;flex:none;background:var(--pine-900);color:#fff;padding:24px 16px;display:flex;flex-direction:column}
  .side .brand{font-weight:800;letter-spacing:.06em;padding:4px 8px 22px;font-size:15px}
  .side .brand .by{font-weight:500;font-size:10px;letter-spacing:.18em;color:var(--leaf);display:block;margin-top:2px}
  .navi{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:12px;border:0;background:none;color:rgba(255,255,255,.7);
    font-family:var(--font);font-weight:600;font-size:14.5px;cursor:pointer;text-align:left;width:100%}
  .navi.on{background:rgba(255,255,255,.12);color:#fff}
  .me{margin-top:auto;display:flex;align-items:center;gap:10px;padding:12px 10px;background:rgba(255,255,255,.06);border-radius:12px}
  .me .av{width:34px;height:34px;border-radius:50%;background:var(--leaf);color:var(--pine-900);font-weight:700;display:flex;align-items:center;justify-content:center;font-size:13px}
  main{flex:1;overflow:auto;padding:34px 40px}
  .inner{max-width:1000px;margin:0 auto}
  h1{font-weight:700;letter-spacing:-.01em;margin:0;font-size:27px}
  .muted{color:var(--muted)} .mono{font-family:var(--mono);font-size:11.5px;color:var(--subtle)}
  .card{background:#fff;border:1px solid var(--b-sub);border-radius:20px;box-shadow:0 2px 6px rgba(4,46,34,.07)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5em;font-family:var(--font);font-weight:600;border:0;
    border-radius:999px;cursor:pointer;padding:0 20px;min-height:44px;font-size:14.5px;transition:.18s}
  .btn.primary{background:var(--pine);color:#fff}.btn.primary:hover{background:var(--pine-800)}
  .btn.secondary{background:#fff;color:var(--pine);border:1.5px solid var(--b-def)}
  .btn.sm{min-height:38px;padding:0 14px;font-size:13px}
  .btn[disabled]{opacity:.5;cursor:not-allowed}
  .stats{display:flex;gap:14px;margin:22px 0}
  .stat{flex:1;background:#fff;border:1px solid var(--b-sub);border-radius:20px;padding:16px 18px}
  .stat .n{font-size:30px;font-weight:800;letter-spacing:-.02em}
  .field{display:flex;flex-direction:column;gap:7px}
  .field label{font-size:14px;font-weight:600}
  .field input{font-family:var(--font);font-size:15px;border:1.5px solid var(--b-def);border-radius:14px;padding:12px 14px;min-height:46px}
  .field input:focus{outline:none;border-color:var(--pine);box-shadow:0 0 0 4px rgba(124,176,65,.35)}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:12px 16px;background:var(--gray-50);font-weight:700}
  td{padding:13px 16px;border-top:1px solid var(--b-sub);font-size:14px}
  tr.clk{cursor:pointer} tr.clk:hover{background:var(--gray-50)}
  .av{width:36px;height:36px;border-radius:50%;background:var(--pine-100);color:var(--pine);font-weight:700;display:inline-flex;align-items:center;justify-content:center;font-size:13px}
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px}
  .dot{width:7px;height:7px;border-radius:50%;background:currentColor}
  .b-neutral{background:var(--gray-100);color:#3a453e}.b-info{background:var(--pine-50);color:var(--pine)}
  .b-pine{background:var(--pine-100);color:var(--pine)}.b-ok{background:var(--leaf-50);color:var(--leaf-700)}
  .b-warn{background:var(--amber-bg);color:#c9871f}.b-danger{background:var(--clay-bg);color:#b34a3c}
  .alert{display:flex;gap:12px;padding:14px 16px;border-radius:14px;background:var(--leaf-50);color:var(--leaf-700);border:1px solid var(--leaf-100);font-size:14px}
  code.link{display:block;font-family:var(--mono);font-size:12.5px;background:var(--gray-50);border:1px solid var(--b-sub);border-radius:12px;padding:12px 14px;color:var(--pine);word-break:break-all}
  a.link{color:var(--pine);font-weight:600;text-decoration:none;cursor:pointer}
  .tl{display:flex;gap:12px;padding-bottom:14px}
  .tl .pt{width:11px;height:11px;border-radius:50%;flex:none;margin-top:3px}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:s .7s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="layout">
  <aside class="side">
    <div class="brand">HEALTHY MIND<span class="by">BY AVIK</span></div>
    <button class="navi on" id="nav-dash" onclick="go('dash')">▦ Candidates</button>
    <button class="navi" id="nav-create" onclick="go('create')">＋ Add candidate</button>
    <div id="supernav" style="display:none">
      <div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);padding:18px 12px 8px;font-weight:700">Portal admin</div>
      <button class="navi" id="nav-docs" onclick="go('docs')">▤ Documents</button>
      <button class="navi" id="nav-policies" onclick="go('policies')">✓ Policies</button>
      <button class="navi" id="nav-roles" onclick="go('roles')">◐ Document sets</button>
      <button class="navi" id="nav-emails" onclick="go('emails')">✉ Emails</button>
      <button class="navi" id="nav-settings" onclick="go('settings')">⚙ Settings</button>
    </div>
    <div class="me"><span class="av" id="me-av">HR</span><span style="font-size:13px"><b id="me-name">HR Team</b><br><span style="color:rgba(255,255,255,.6);font-size:11.5px">People Ops</span></span></div>
  </aside>
  <main><div class="inner" id="view"></div></main>
</div>

<script>
  var google={script:{run:(function(){
    function build(succ,fail){return new Proxy({},{get:function(_,name){
      if(name==='withSuccessHandler')return function(f){return build(f,fail)};
      if(name==='withFailureHandler')return function(f){return build(succ,f)};
      return function(){var a=[].slice.call(arguments);
        fetch('/api',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:name,args:a})})
        .then(function(r){return r.json()}).then(function(j){if(j.error){if(fail)fail(new Error(j.error))}else{if(succ)succ(j.result)}})
        .catch(function(e){if(fail)fail(e)});};
    }});}
    return build(null,null);
  })()}};
  var BOOT={}; var KEY='';
  var view=document.getElementById('view');
  var cache=[];

  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
  function initials(n){return (n||'').split(' ').map(function(x){return x[0]}).slice(0,2).join('')}
  function statusBadge(s){
    var m={not_started:['b-neutral','Not started'],invited:['b-info','Invited'],in_progress:['b-info','In progress'],
      signed:['b-pine','Documents signed'],completed:['b-ok','Completed'],expired:['b-danger','Link expired']};
    var x=m[s]||m.not_started;return '<span class="badge '+x[0]+'"><span class="dot"></span>'+x[1]+'</span>';
  }
  function setNav(n){['dash','create','docs','policies','roles','emails','settings'].forEach(function(k){var el=document.getElementById('nav-'+k);if(el)el.className='navi'+(k===n?' on':'')})}
  function go(s){setNav(s==='detail'?'dash':s);if(s==='dash')dash();else if(s==='create')create();
    else if(s==='docs')editDocs();else if(s==='policies')editPolicies();else if(s==='roles')editRoles();
    else if(s==='emails')editEmails();else if(s==='settings')editSettings();}
  function fmt(iso){try{return new Date(iso).toLocaleString()}catch(e){return iso}}

  function dash(){
    view.innerHTML='<div style="display:flex;justify-content:space-between;align-items:flex-start"><div>'+
      '<h1>Candidates</h1><p class="muted" style="margin:6px 0 0">Track everyone\u2019s onboarding and grab signed documents.</p></div>'+
      '<button class="btn primary" onclick="go(\'create\')">＋ New candidate</button></div>'+
      '<div id="stats" class="stats"></div><div class="card"><div style="overflow:hidden;border-radius:20px"><table id="tbl">'+
      '<thead><tr><th>Candidate</th><th>Role · joining</th><th>Status</th><th>Progress</th><th></th></tr></thead>'+
      '<tbody><tr><td colspan="5" class="muted" style="padding:24px 16px">Loading…</td></tr></tbody></table></div></div>';
    google.script.run.withSuccessHandler(function(list){
      cache=list;
      var s={total:list.length,inp:0,done:0,ns:0};
      list.forEach(function(c){if(c.status==='completed')s.done++;else if(c.status==='in_progress'||c.status==='signed')s.inp++;else if(c.status==='not_started'||c.status==='invited')s.ns++});
      document.getElementById('stats').innerHTML=
        stat(s.total,'Total candidates','')+stat(s.inp,'In progress','var(--pine)')+stat(s.done,'Completed','var(--leaf-600)')+stat(s.ns,'Awaiting start','var(--subtle)');
      var tb=document.querySelector('#tbl tbody');
      if(!list.length){tb.innerHTML='<tr><td colspan="5" class="muted" style="padding:24px 16px">No candidates yet. Add your first one.</td></tr>';return}
      tb.innerHTML=list.map(function(c){
        var prog=(c.signed?c.signed.length:0)+' / '+BOOT_docCount()+' signed';
        return '<tr class="clk" onclick="detail(\''+c.id+'\')"><td><div style="display:flex;align-items:center;gap:12px"><span class="av">'+esc(initials(c.name))+'</span>'+
          '<span><b>'+esc(c.name)+'</b><br><span class="mono">'+esc(c.email)+'</span></span></div></td>'+
          '<td>'+esc(c.role||'—')+'<br><span class="mono">'+(c.joining?'Joins '+esc(c.joining):'')+'</span></td>'+
          '<td>'+statusBadge(c.status)+'</td><td>'+esc(prog)+'</td><td style="text-align:right;color:var(--pine);font-weight:700">&rarr;</td></tr>';
      }).join('');
    }).withFailureHandler(fail).adminListCandidates(KEY);
  }
  function stat(n,l,col){return '<div class="stat"><div class="n" style="'+(col?'color:'+col:'')+'">'+n+'</div><span class="mono">'+esc(l)+'</span></div>'}
  function BOOT_docCount(){return BOOT.docCount||6}

  function create(){
    view.innerHTML='<a class="link" onclick="go(\'dash\')">&larr; Candidates</a>'+
      '<h1 style="margin-top:14px">Add a new candidate</h1>'+
      '<p class="muted" style="margin:6px 0 20px">We\u2019ll generate a secure, single-use link and email it to them.</p>'+
      '<div class="card" style="padding:22px;max-width:620px"><div id="form" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">'+
        f('name','Full name','e.g. Priya Sharma')+f('email','Work email','name@example.com')+
        f('role','Role','e.g. Care Coordinator')+f('joining','Date of joining','',"date")+
      '</div><div style="display:flex;justify-content:flex-end;gap:10px;margin-top:18px">'+
        '<button class="btn secondary" onclick="go(\'dash\')">Cancel</button>'+
        '<button class="btn primary" id="gen" onclick="submitCreate()">Generate &amp; send link</button></div>'+
        '<div id="result" style="margin-top:18px"></div></div>'+
      '<div class="card" style="padding:22px;max-width:620px;margin-top:16px">'+
        '<h3 style="margin:0 0 6px">Bulk import (CSV)</h3>'+
        '<p class="muted" style="margin:0 0 12px;font-size:14px">One candidate per line: <span class="mono">name,email,role,joining</span>. A header row is optional. Each gets a secure link by email.</p>'+
        '<textarea id="csv" style="'+TA+'" rows="5" placeholder="Priya Sharma,priya@example.com,Care Coordinator,01 Jul 2026\nRahul Mehta,rahul@example.com,Backend Engineer,15 Jul 2026"></textarea>'+
        '<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:12px">'+
          '<button class="btn primary" id="imp" onclick="submitImport()">Import &amp; send links</button></div>'+
        '<div id="impresult" style="margin-top:14px"></div></div>';
  }
  function parseCsv(text){
    var rows=[];
    String(text||'').split(/\r?\n/).forEach(function(line){
      var t=line.trim(); if(!t) return;
      var cols=t.split(',').map(function(s){return s.trim()});
      if(/^name$/i.test(cols[0])&&/^e-?mail$/i.test(cols[1]||'')) return; // skip header
      if(!cols[0]||!cols[1]) return;
      rows.push({name:cols[0],email:cols[1],role:cols[2]||'',joining:cols[3]||''});
    });
    return rows;
  }
  function submitImport(){
    var rows=parseCsv(document.getElementById('csv').value);
    if(!rows.length){alert('Add at least one valid line: name,email,role,joining');return}
    var b=document.getElementById('imp');b.disabled=true;b.innerHTML='<span class="spin"></span> Importing '+rows.length+'…';
    google.script.run.withSuccessHandler(function(r){
      b.disabled=false;b.textContent='Import & send links';
      var skipped=(r.skipped&&r.skipped.length)?'<p class="mono" style="margin-top:8px;color:var(--clay)">Skipped: '+esc(r.skipped.join('; '))+'</p>':'';
      document.getElementById('impresult').innerHTML='<div class="alert">✓ Imported '+r.created+' candidate'+(r.created===1?'':'s')+' and emailed their links.</div>'+skipped;
    }).withFailureHandler(function(e){b.disabled=false;b.textContent='Import & send links';fail(e)})
    .adminImportCandidates(rows,KEY);
  }
  function f(id,label,ph,type){return '<div class="field" '+(id==='role'||id==='joining'?'':'')+'><label>'+esc(label)+'</label>'+
    '<input id="in-'+id+'" type="'+(type||'text')+'" placeholder="'+esc(ph)+'"></div>'}

  function submitCreate(){
    var name=val('name'),email=val('email');
    if(!name||!email){alert('Name and email are required.');return}
    var b=document.getElementById('gen');b.disabled=true;b.innerHTML='<span class="spin"></span> Generating…';
    google.script.run.withSuccessHandler(function(row){
      document.getElementById('form').style.opacity=.5;
      document.getElementById('result').innerHTML=
        '<div class="alert">✓ Link generated &amp; emailed to '+esc(row.email)+'.</div>'+
        '<p class="mono" style="margin:14px 0 6px">Secure single-use link · expires in '+(BOOT.ttl||7)+' days</p>'+
        '<code class="link">'+esc(row.link)+'</code>'+
        '<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:16px">'+
        '<button class="btn secondary" onclick="go(\'dash\')">Back to candidates</button></div>';
      b.style.display='none';
    }).withFailureHandler(function(e){b.disabled=false;b.textContent='Generate & send link';fail(e)})
    .adminCreateCandidate({name:name,email:email,role:val('role'),joining:val('joining')},KEY);
  }
  function val(id){var el=document.getElementById('in-'+id);return el?el.value.trim():''}

  function detail(id){
    setNav('dash');
    view.innerHTML='<a class="link" onclick="go(\'dash\')">&larr; Candidates</a><p class="muted" style="margin-top:16px">Loading…</p>';
    google.script.run.withSuccessHandler(function(c){
      var docs=(c.signed||[]);
      var files=(c.files||[]);
      var fileRows=files.length?files.map(function(f){
        return '<div style="display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--b-sub)">'+
          '<span class="av" style="border-radius:10px;width:34px;height:34px;background:var(--leaf-100);color:var(--leaf-700)">PDF</span>'+
          '<span style="flex:1"><b style="font-size:14px">'+esc(f.name)+'</b><br><span class="mono">'+fmt(f.updated)+'</span></span>'+
          '<a class="link" href="'+esc(f.url)+'" target="_blank">Open</a></div>';
      }).join(''):'<p class="muted" style="margin:10px 0">No signed PDFs yet.</p>';
      var logRows=(c.log||[]).map(function(e,i){
        var col=/Signed|Completed/.test(e.action)?'var(--leaf)':/Created|Opened|resent/.test(e.action)?'var(--pine)':'var(--b-def)';
        return '<div class="tl"><span class="pt" style="background:'+col+'"></span><span><b style="font-size:13.5px">'+esc(e.action)+'</b><br><span class="mono">'+fmt(e.at)+(e.actor?' · '+esc(e.actor):'')+'</span></span></div>';
      }).join('')||'<p class="muted">No activity yet.</p>';
      view.innerHTML='<a class="link" onclick="go(\'dash\')">&larr; Candidates</a>'+
        '<div style="display:flex;align-items:center;gap:16px;margin-top:14px"><span class="av" style="width:54px;height:54px;font-size:18px">'+esc(initials(c.name))+'</span>'+
        '<div style="flex:1"><h1 style="font-size:24px">'+esc(c.name)+'</h1><p class="muted" style="margin:4px 0 0">'+esc(c.role||'—')+(c.joining?' · joins '+esc(c.joining):'')+' · '+esc(c.email)+'</p></div>'+statusBadge(c.status)+'</div>'+
        '<div style="display:grid;grid-template-columns:1.4fr 1fr;gap:18px;margin-top:22px;align-items:start">'+
          '<div class="card" style="padding:20px"><div style="display:flex;justify-content:space-between;align-items:center"><h3 style="margin:0">Signed documents</h3>'+
            '<button class="btn secondary sm" onclick="resend(\''+c.id+'\')">Resend link</button></div>'+
            '<p class="mono" style="margin:8px 0 0">'+docs.length+' of '+BOOT_docCount()+' documents signed</p>'+fileRows+
            detailsBlock(c.details)+'</div>'+
          '<div class="card" style="padding:20px"><h3 style="margin:0 0 12px">Activity log</h3>'+logRows+'</div>'+
        '</div>';
    }).withFailureHandler(fail).adminCandidateDetail(id,KEY);
  }
  function resend(id){google.script.run.withSuccessHandler(function(){alert('Onboarding link resent.')}).withFailureHandler(fail).adminResend(id,KEY)}
  function detailsBlock(d){
    if(!d) return '';
    function row(l,v){return v?'<div style="display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-top:1px solid var(--b-sub)"><span class="mono">'+esc(l)+'</span><span style="font-size:13.5px;font-weight:600">'+esc(v)+'</span></div>':''}
    function fileLink(l,url){return url?'<a class="link" style="display:inline-block;margin-right:14px;font-size:13px" href="'+esc(url)+'" target="_blank">'+esc(l)+' \u2197</a>':'<span class="mono" style="margin-right:14px">'+esc(l)+': —</span>'}
    return '<div style="margin-top:16px;border-top:2px solid var(--leaf-50);padding-top:14px">'+
      '<h3 style="margin:0 0 8px;font-size:15px">KYC &amp; bank details</h3>'+
      '<p style="margin:0 0 10px">'+fileLink('PAN',d.panFileUrl)+fileLink('Aadhaar',d.aadhaarFileUrl)+'</p>'+
      row('PAN number',d.pan)+row('Aadhaar number',d.aadhaar)+row('Account holder',d.accName)+
      row('Bank',d.bankName)+row('Account number',d.accNo)+row('IFSC',d.ifsc)+'</div>';
  }

  /* ===================== SUPER-ADMIN: portal editors ===================== */
  var PORTAL=null;
  var TA='width:100%;box-sizing:border-box;font-family:var(--font);font-size:14px;border:1.5px solid var(--b-def);border-radius:12px;padding:10px 12px;line-height:1.5;resize:vertical';
  var IN='width:100%;box-sizing:border-box;font-family:var(--font);font-size:14.5px;font-weight:600;border:1.5px solid var(--b-def);border-radius:12px;padding:10px 12px';
  function loadPortal(cb){ if(PORTAL)return cb(); view.innerHTML='<p class="muted">Loading…</p>';
    google.script.run.withSuccessHandler(function(p){PORTAL=p;cb()}).withFailureHandler(fail).adminGetPortal(KEY); }
  function savePortal(){ google.script.run.withSuccessHandler(function(p){PORTAL=p;toast('Saved — changes are live')}).withFailureHandler(fail).adminSavePortal(PORTAL,KEY); }
  function toast(m){alert(m)}
  function saveBar(t){return '<div style="display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px">'+
    '<div><h1>'+t+'</h1><p class="muted" style="margin:6px 0 0">Changes apply to every candidate\u2019s portal immediately.</p></div>'+
    '<button class="btn primary" onclick="savePortal()">Save changes</button></div>'}

  // -- documents --
  function setDoc(i,f,v){PORTAL.documents[i][f]=v}
  function setSec(i,j,f,v){PORTAL.documents[i].sections[j][f]=v}
  function addSec(i){PORTAL.documents[i].sections.push({h:'',p:''});editDocs()}
  function delSec(i,j){PORTAL.documents[i].sections.splice(j,1);editDocs()}
  function addDoc(){PORTAL.documents.push({name:'New document',intro:'',sections:[]});editDocs()}
  function delDoc(i){if(confirm('Remove this document?')){PORTAL.documents.splice(i,1);editDocs()}}
  function editDocs(){ loadPortal(function(){
    view.innerHTML=saveBar('Documents')+PORTAL.documents.map(function(d,i){
      var secs=(d.sections||[]).map(function(s,j){
        return '<div style="display:grid;grid-template-columns:1fr;gap:6px;margin-top:10px;padding:12px;background:var(--gray-50);border-radius:12px">'+
          '<input style="'+IN+'" value="'+esc(s.h)+'" oninput="setSec('+i+','+j+',\'h\',this.value)" placeholder="Section heading">'+
          '<textarea style="'+TA+'" rows="2" oninput="setSec('+i+','+j+',\'p\',this.value)" placeholder="Section text">'+esc(s.p)+'</textarea>'+
          '<a class="link" style="font-size:12.5px" onclick="delSec('+i+','+j+')">Remove section</a></div>';
      }).join('');
      return '<div class="card" style="padding:20px;margin-bottom:14px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:12px">'+
        '<input style="'+IN+';font-size:16px;font-weight:700" value="'+esc(d.name)+'" oninput="setDoc('+i+',\'name\',this.value)">'+
        '<button class="btn secondary sm" onclick="delDoc('+i+')">Delete</button></div>'+
        '<textarea style="'+TA+';margin-top:10px" rows="2" oninput="setDoc('+i+',\'intro\',this.value)" placeholder="Intro paragraph (supports {{company}})">'+esc(d.intro)+'</textarea>'+
        secs+'<a class="link" style="display:inline-block;margin-top:12px;font-size:13px" onclick="addSec('+i+')">＋ Add section</a></div>';
    }).join('')+'<button class="btn secondary" onclick="addDoc()">＋ Add document</button>';
  }); }

  // -- policies --
  function setPol(i,f,v){PORTAL.policies[i][f]=v}
  function addPol(){PORTAL.policies.push({name:'New policy',summary:'',body:''});editPolicies()}
  function delPol(i){if(confirm('Remove this policy?')){PORTAL.policies.splice(i,1);editPolicies()}}
  function editPolicies(){ loadPortal(function(){
    view.innerHTML=saveBar('Policies')+PORTAL.policies.map(function(p,i){
      return '<div class="card" style="padding:20px;margin-bottom:14px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:12px">'+
        '<input style="'+IN+';font-size:16px;font-weight:700" value="'+esc(p.name)+'" oninput="setPol('+i+',\'name\',this.value)">'+
        '<button class="btn secondary sm" onclick="delPol('+i+')">Delete</button></div>'+
        '<input style="'+IN+';margin-top:10px;font-weight:500" value="'+esc(p.summary)+'" oninput="setPol('+i+',\'summary\',this.value)" placeholder="One-line summary">'+
        '<textarea style="'+TA+';margin-top:8px" rows="3" oninput="setPol('+i+',\'body\',this.value)" placeholder="Full policy text">'+esc(p.body)+'</textarea></div>';
    }).join('')+'<button class="btn secondary" onclick="addPol()">＋ Add policy</button>';
  }); }

  // -- settings --
  function setCfg(f,v){PORTAL[f]=v}
  function setZoho(f,v){PORTAL.zoho=PORTAL.zoho||{};PORTAL.zoho[f]=v}
  function setEsign(f,v){PORTAL.esign=PORTAL.esign||{};PORTAL.esign[f]=v}
  function toggleEsignDoc(name){var e=PORTAL.esign=PORTAL.esign||{documents:[]};e.documents=e.documents||[];var k=e.documents.indexOf(name);if(k<0)e.documents.push(name);else e.documents.splice(k,1);editSettings()}
  function editSettings(){ loadPortal(function(){
    var z=PORTAL.zoho||{};
    view.innerHTML=saveBar('Settings')+
      '<div class="card" style="padding:20px;margin-bottom:14px;max-width:620px">'+
        '<h3 style="margin:0 0 14px">Portal</h3>'+
        '<div class="field" style="margin-bottom:14px"><label>Company name</label><input style="'+IN+'" value="'+esc(PORTAL.company)+'" oninput="setCfg(\'company\',this.value)"></div>'+
        '<div class="field"><label>Onboarding link expiry (days)</label><input style="'+IN+'" type="number" min="1" value="'+esc(PORTAL.linkTtlDays)+'" oninput="setCfg(\'linkTtlDays\',parseInt(this.value||7,10))"></div>'+
        '<label class="row" style="cursor:pointer;margin-top:16px" onclick="setCfg(\'collectDetails\',!(PORTAL.collectDetails!==false));editSettings()">'+
          '<span class="check'+(PORTAL.collectDetails!==false?' on':'')+'" style="width:24px;height:24px;border-radius:7px;border:2px solid var(--b-def);display:inline-flex;align-items:center;justify-content:center;'+(PORTAL.collectDetails!==false?'background:var(--leaf);border-color:var(--leaf);color:#fff':'')+'">'+(PORTAL.collectDetails!==false?'✓':'')+'</span>'+
          '<span style="font-weight:600;font-size:14.5px">Collect KYC (PAN, Aadhaar) &amp; bank details after signing</span></label>'+
      '</div>'+
      '<div class="card" style="padding:20px;max-width:620px">'+
        '<h3 style="margin:0 0 14px">Zoho WorkDrive sync</h3>'+
        '<label class="row" style="cursor:pointer;margin-bottom:14px" onclick="setZoho(\'enabled\',!(PORTAL.zoho&&PORTAL.zoho.enabled));editSettings()">'+
          '<span class="check'+(z.enabled?' on':'')+'" style="width:24px;height:24px;border-radius:7px;border:2px solid var(--b-def);display:inline-flex;align-items:center;justify-content:center;'+(z.enabled?'background:var(--leaf);border-color:var(--leaf);color:#fff':'')+'">'+(z.enabled?'✓':'')+'</span>'+
          '<span style="font-weight:600;font-size:14.5px">Mirror signed PDFs to Zoho WorkDrive</span></label>'+
        '<div class="field" style="margin-bottom:14px"><label>Data centre</label><input style="'+IN+'" value="'+esc(z.dc||'com')+'" oninput="setZoho(\'dc\',this.value)" placeholder="com / in / eu / au"></div>'+
        '<div class="field"><label>Parent WorkDrive folder ID</label><input style="'+IN+'" value="'+esc(z.parentFolderId||'')+'" oninput="setZoho(\'parentFolderId\',this.value)"></div>'+
        '<p class="mono" style="margin-top:14px">Zoho client ID / secret / refresh token stay in Code.gs (CONFIG) for security.</p>'+
      '</div>'+
      esignCard();
  }); }
  function esignCard(){
    var e=PORTAL.esign||{documents:[]};
    var allDocs=PORTAL.documents.map(function(d){return d.name});
    var checks=allDocs.map(function(n){
      var on=(e.documents||[]).indexOf(n)>=0;
      return '<label class="row" style="cursor:pointer;gap:8px;margin-top:6px" onclick="toggleEsignDoc(\''+esc(n).replace(/\x27/g,"\\\x27")+'\')">'+
        '<span class="check'+(on?' on':'')+'" style="width:20px;height:20px;border-radius:6px;border:2px solid var(--b-def);display:inline-flex;align-items:center;justify-content:center;font-size:12px;'+(on?'background:var(--leaf);border-color:var(--leaf);color:#fff':'')+'">'+(on?'✓':'')+'</span>'+
        '<span style="font-size:14px">'+esc(n)+'</span></label>';
    }).join('');
    var st=e.signType||'AADHAAR';
    function opt(v,l){return '<option value="'+v+'"'+(st===v?' selected':'')+'>'+l+'</option>'}
    return '<div class="card" style="padding:20px;max-width:620px;margin-top:14px">'+
      '<h3 style="margin:0 0 14px">Legal eSign — Leegality</h3>'+
      '<label class="row" style="cursor:pointer;margin-bottom:14px" onclick="setEsign(\'enabled\',!(PORTAL.esign&&PORTAL.esign.enabled));editSettings()">'+
        '<span class="check'+(e.enabled?' on':'')+'" style="width:24px;height:24px;border-radius:7px;border:2px solid var(--b-def);display:inline-flex;align-items:center;justify-content:center;'+(e.enabled?'background:var(--leaf);border-color:var(--leaf);color:#fff':'')+'">'+(e.enabled?'✓':'')+'</span>'+
        '<span style="font-weight:600;font-size:14.5px">Sign selected documents legally via Leegality</span></label>'+
      '<div class="field" style="margin-bottom:8px"><label>Signature type</label>'+
        '<select style="'+IN+'" onchange="setEsign(\'signType\',this.value)">'+opt('AADHAAR','Aadhaar eSign')+opt('VIRTUAL','Virtual sign (OTP/email)')+opt('DSC','DSC token')+'</select></div>'+
      '<p class="mono" style="margin:12px 0 2px">Documents signed via Leegality (others use the in-portal signature)</p>'+checks+
      '<p class="mono" style="margin-top:14px">Leegality auth token / profile ID stay in Code.gs (CONFIG). Register your web-app URL as the Leegality callback.</p>'+
    '</div>';
  }

  // -- emails --
  function setEmail(f,v){PORTAL.emails=PORTAL.emails||{};PORTAL.emails[f]=v}
  function editEmails(){ loadPortal(function(){
    var e=PORTAL.emails||{};
    view.innerHTML=saveBar('Emails')+
      '<p class="mono" style="margin:-8px 0 16px">Placeholders: {{firstName}} · {{name}} · {{company}} · {{role}} · {{joining}} · {{link}} · {{expires}}. A line that is just {{link}} renders as a button.</p>'+
      '<div class="card" style="padding:20px;margin-bottom:14px;max-width:680px">'+
        '<h3 style="margin:0 0 14px">Invite email (sent when a candidate is created)</h3>'+
        '<div class="field" style="margin-bottom:12px"><label>Subject</label><input style="'+IN+';font-weight:500" value="'+esc(e.inviteSubject)+'" oninput="setEmail(\'inviteSubject\',this.value)"></div>'+
        '<div class="field"><label>Body</label><textarea style="'+TA+'" rows="7" oninput="setEmail(\'inviteBody\',this.value)">'+esc(e.inviteBody)+'</textarea></div>'+
      '</div>'+
      '<div class="card" style="padding:20px;max-width:680px">'+
        '<h3 style="margin:0 0 14px">Completion email (sent when onboarding finishes)</h3>'+
        '<div class="field" style="margin-bottom:12px"><label>Subject</label><input style="'+IN+';font-weight:500" value="'+esc(e.completionSubject)+'" oninput="setEmail(\'completionSubject\',this.value)"></div>'+
        '<div class="field"><label>Body</label><textarea style="'+TA+'" rows="6" oninput="setEmail(\'completionBody\',this.value)">'+esc(e.completionBody)+'</textarea></div>'+
      '</div>';
  }); }

  // -- per-role document sets --
  function setRoleName(i,v){PORTAL.roleSets[i].role=v}
  function toggleRoleDoc(i,name){var s=PORTAL.roleSets[i];s.documents=s.documents||[];var k=s.documents.indexOf(name);if(k<0)s.documents.push(name);else s.documents.splice(k,1);editRoles()}
  function addRoleSet(){PORTAL.roleSets=PORTAL.roleSets||[];PORTAL.roleSets.push({role:'',documents:PORTAL.documents.map(function(d){return d.name})});editRoles()}
  function delRoleSet(i){PORTAL.roleSets.splice(i,1);editRoles()}
  function editRoles(){ loadPortal(function(){
    PORTAL.roleSets=PORTAL.roleSets||[];
    var allDocs=PORTAL.documents.map(function(d){return d.name});
    var sets=PORTAL.roleSets.map(function(rs,i){
      var checks=allDocs.map(function(n){
        var on=(rs.documents||[]).indexOf(n)>=0;
        return '<label class="row" style="cursor:pointer;gap:8px;margin-top:6px" onclick="toggleRoleDoc('+i+',\''+esc(n).replace(/\x27/g,"\\\x27")+'\')">'+
          '<span class="check'+(on?' on':'')+'" style="width:20px;height:20px;border-radius:6px;border:2px solid var(--b-def);display:inline-flex;align-items:center;justify-content:center;font-size:12px;'+(on?'background:var(--leaf);border-color:var(--leaf);color:#fff':'')+'">'+(on?'✓':'')+'</span>'+
          '<span style="font-size:14px">'+esc(n)+'</span></label>';
      }).join('');
      return '<div class="card" style="padding:20px;margin-bottom:14px;max-width:680px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:12px">'+
        '<input style="'+IN+';font-size:15px" value="'+esc(rs.role)+'" oninput="setRoleName('+i+',this.value)" placeholder="Role name (must match candidate role exactly)">'+
        '<button class="btn secondary sm" onclick="delRoleSet('+i+')">Delete</button></div>'+
        '<p class="mono" style="margin:12px 0 2px">Documents this role must sign</p>'+checks+'</div>';
    }).join('');
    view.innerHTML=saveBar('Document sets by role')+
      '<p class="mono" style="margin:-8px 0 16px">Map a role to a subset of documents. Roles with no set here get ALL documents.</p>'+
      sets+'<button class="btn secondary" onclick="addRoleSet()">＋ Add role set</button>';
  }); }

  function fail(e){alert((e&&e.message)||'Something went wrong')}

  function init(){
    document.getElementById('me-name').textContent=(BOOT.hrEmail||'HR Team');
    document.getElementById('me-av').textContent=(BOOT.hrEmail?BOOT.hrEmail.slice(0,2).toUpperCase():'HR');
    var me=document.querySelector('.me'); if(me){me.style.cursor='pointer';me.title='Sign out';me.onclick=logout;}
    if(BOOT.isSuperAdmin)document.getElementById('supernav').style.display='block';
    dash();
  }
  (function(){
    // Proper email + password login at one clean URL (/admin). No key in the address bar.
    var saved = sessionStorage.getItem('hm_admin_key') || '';
    if (saved) { boot(saved); return; }
    showLogin('');
  })();
  function showLogin(msg){
    document.body.innerHTML =
      '<div class="lg-wrap">'+
        '<div class="lg-brand">'+
          '<img class="lg-logo" src="assets/logo-white.png" alt="Healthy Mind by Avik">'+
          '<div class="lg-brandcopy">'+
            '<h1>Employee Onboarding</h1>'+
            '<p>A calm, secure welcome for every new joiner — documents, signatures, and details, all in one place.</p>'+
          '</div>'+
          '<div class="lg-foot">HEALTHY MIND BY AVIK\u2122</div>'+
        '</div>'+
        '<div class="lg-form">'+
          '<div class="lg-card">'+
            '<h2>Welcome back</h2>'+
            '<p class="lg-sub">Sign in to your HR console.</p>'+
            (msg?'<div class="lg-err">'+msg+'</div>':'')+
            '<form id="lf" autocomplete="on">'+
              '<label>Email address</label>'+
              '<input id="le" type="email" autocomplete="username" placeholder="you@podhealth.club">'+
              '<label>Password</label>'+
              '<input id="lp" type="password" autocomplete="current-password" placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022">'+
              '<button class="btn primary block lg-btn" id="lb" type="submit">Sign in</button>'+
            '</form>'+
            '<p class="lg-note">\uD83D\uDD12 Your session stays on this device. Candidates use their own private link \u2014 no login.</p>'+
          '</div>'+
        '</div>'+
      '</div>'+
      '<style>'+
        '.lg-wrap{display:flex;min-height:100vh;font-family:var(--font)}'+
        '.lg-brand{flex:1;position:relative;overflow:hidden;background:linear-gradient(150deg,#042e22,#073b2c 60%,#0b4a35);color:#fff;padding:54px 48px;display:flex;flex-direction:column;justify-content:space-between}'+
        '.lg-brand::after{content:"";position:absolute;right:-120px;bottom:-100px;width:460px;height:460px;background:url(assets/leaf-mark.png) center/contain no-repeat;opacity:.10;transform:rotate(12deg)}'+
        '.lg-logo{height:40px;width:auto;position:relative;z-index:1}'+
        '.lg-brandcopy{position:relative;z-index:1;max-width:420px}'+
        '.lg-brandcopy h1{font-size:40px;font-weight:800;letter-spacing:-.02em;line-height:1.1;margin:0 0 16px;color:#fff}'+
        '.lg-brandcopy p{font-size:16.5px;line-height:1.6;color:rgba(255,255,255,.8);margin:0}'+
        '.lg-foot{position:relative;z-index:1;font-size:11px;font-weight:700;letter-spacing:.18em;color:var(--leaf-300)}'+
        '.lg-form{flex:1;display:flex;align-items:center;justify-content:center;background:var(--cream);padding:40px 28px}'+
        '.lg-card{width:380px;max-width:100%}'+
        '.lg-card h2{font-size:26px;font-weight:800;letter-spacing:-.01em;color:var(--ink);margin:0 0 4px}'+
        '.lg-sub{color:var(--muted);margin:0 0 24px;font-size:15px}'+
        '.lg-err{background:#fcf1ee;color:#b34a3c;border-radius:12px;padding:11px 14px;font-size:13.5px;margin-bottom:18px;font-weight:500}'+
        '.lg-card label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin:0 0 7px}'+
        '.lg-card input{width:100%;box-sizing:border-box;font-family:var(--font);font-size:15px;border:1.5px solid var(--b-def);border-radius:13px;padding:13px 15px;margin:0 0 18px;transition:border-color .15s,box-shadow .15s;background:#fff}'+
        '.lg-card input:focus{outline:none;border-color:var(--pine);box-shadow:0 0 0 4px rgba(124,176,65,.28)}'+
        '.lg-btn{min-height:52px;font-size:16px;margin-top:4px}'+
        '.lg-note{margin:20px 0 0;font-size:12.5px;color:var(--subtle);line-height:1.5}'+
        '@media(max-width:820px){.lg-brand{display:none}.lg-form{background:linear-gradient(180deg,var(--pine-50),var(--cream) 50%)}}'+
      '</style>';
    document.getElementById('lf').onsubmit=function(e){
      e.preventDefault();
      var em=document.getElementById('le').value.trim(), pw=document.getElementById('lp').value;
      var b=document.getElementById('lb'); b.disabled=true; b.textContent='Signing in\u2026';
      fetch('/api',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'adminLogin',args:[em,pw]})})
        .then(function(r){return r.json()}).then(function(j){
          if(j.error||!j.result||!j.result.key){showLogin(j.error||'Wrong email or password.');return;}
          sessionStorage.setItem('hm_admin_key', j.result.key);
          boot(j.result.key);
        }).catch(function(){showLogin('Unable to reach the server. Please retry.');});
      return false;
    };
  }
  function boot(key){
    KEY=key;
    fetch('/api',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'getAdminBoot',args:[KEY]})})
      .then(function(r){return r.json()}).then(function(j){
        if(j.error){sessionStorage.removeItem('hm_admin_key');showLogin(j.error);return;}
        BOOT=j.result; KEY=BOOT.adminKey||KEY; init();
      }).catch(function(e){showLogin('Unable to load console.');});
  }
  function logout(){sessionStorage.removeItem('hm_admin_key');location.reload();}
</script>
</body>
</html>
